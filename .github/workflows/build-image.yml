name: Build Docker Image

on:
   workflow_dispatch: # Déclenchement manuel uniquement
   # Décommentez pour builder à chaque push sur main :
   # push:
   #   branches: [main]

env:
   REGISTRY: ghcr.io

jobs:
   build-and-push:
      runs-on: ubuntu-latest
      permissions:
         contents: read
         packages: write

      steps:
         - uses: actions/checkout@v4

         - name: Log in to GitHub Container Registry
           uses: docker/login-action@v3
           with:
              registry: ${{ env.REGISTRY }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

         - name: Build and push
           uses: docker/build-push-action@v6
           with:
              context: .
              push: true
              tags: |
                 ghcr.io/graphandco/infirmiere68000:latest
                 ghcr.io/graphandco/infirmiere68000:${{ github.sha }}
              build-args: |
                 NEXT_PUBLIC_WP_GRAPHQL=${{ vars.NEXT_PUBLIC_WP_GRAPHQL }}
                 NEXT_PUBLIC_MATOMO_URL=${{ vars.NEXT_PUBLIC_MATOMO_URL }}
                 NEXT_PUBLIC_MATOMO_SITE_ID=${{ vars.NEXT_PUBLIC_MATOMO_SITE_ID }}
