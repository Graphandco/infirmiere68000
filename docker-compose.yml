services:
   app:
      container_name: infirmiere68000
      image: ghcr.io/graphandco/infirmiere68000:latest
      # Sans ça, Docker réutilise l’ancienne image locale même si `latest` a été repoussé sur GHCR.
      pull_policy: always
      # build:
      #    context: .
      #    dockerfile: Dockerfile
      #    args:
      #       NEXT_PUBLIC_WP_GRAPHQL: ${NEXT_PUBLIC_WP_GRAPHQL}
      #       NEXT_PUBLIC_MATOMO_URL: ${NEXT_PUBLIC_MATOMO_URL}
      #       NEXT_PUBLIC_MATOMO_SITE_ID: ${NEXT_PUBLIC_MATOMO_SITE_ID}
      restart: unless-stopped
      # ports:
      #    - "3005:3005"
      env_file:
         - .env
      networks:
         - web-network

      # Sécurité de base (Hardening)
      cpus: 0.5
      mem_limit: 512m
      read_only: true
      security_opt:
         - no-new-privileges:true
      tmpfs:
         - /tmp:rw,noexec,nosuid,size=128m
      volumes:
         - next_cache:/app/.next/cache

      # Logs maîtrisés
      logging:
         driver: "json-file"
         options:
            max-size: "10m"
            max-file: "3"

volumes:
   next_cache:

networks:
   web-network:
      external: true
